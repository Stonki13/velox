name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure CPU package
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DVELOX_ENABLE_CUDA=OFF -DVELOX_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Install
        run: cmake --install build --config Release --prefix package/velox
      - name: Verify installed package
        run: |
          cmake -S tests/package_consumer -B package-consumer -DCMAKE_PREFIX_PATH="${{ github.workspace }}/package/velox"
          cmake --build package-consumer --config Release --parallel
          ctest --test-dir package-consumer -C Release --output-on-failure
      - name: Archive and hash
        shell: pwsh
        run: |
          $name = "velox-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}"
          Push-Location package
          cmake -E tar cf "../$name.zip" --format=zip velox
          Pop-Location
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" | Set-Content "$name.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: velox-${{ runner.os }}-${{ runner.arch }}
          path: |
            velox-*.zip
            velox-*.sha256
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create combined manifest
        run: cat artifacts/*.sha256 > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            SHA256SUMS
